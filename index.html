<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trang chủ</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

.header{
    background:#0d6efd;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:80px;
}

.card{
    width:250px;
    background:white;
    padding:30px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

.card a{
    display:inline-block;
    margin-top:15px;
    padding:10px 20px;
    text-decoration:none;
    color:white;
    background:#0d6efd;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="header">
    <h1>QUẢN LÝ SẢN PHẨM</h1>
</div>

<div class="container">

    <div class="card">
        <h2>Admin</h2>
        <p>Quản lý sản phẩm</p>
        <a href="./admin/index.html">Vào Admin</a>
    </div>

    <div class="card">
        <h2>Customer</h2>
        <p>Xem và mua sản phẩm</p>
        <a href="./customer/index.html">Vào Shop</a>
    </div>

</div>

</body>
</html>
